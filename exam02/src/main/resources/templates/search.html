<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>検索＆結果画面</title>
</head>
<body>
<h1>ホテル検索</h1>
<form action="search.html" th:action="@{/hotel/}" method="post">
    <input type="number" name="price" id="price" class="price"> 円以下
    <button>検索</button>
</form>
<div>
    <div th:each="hotel : ${hotelList}">
        <table border="1">
            <tr>
                <th>ホテル名</th>
                <td th:text="${hotel.hotelName}">横浜ベイホテル東急</td>
            </tr>
            <tr>
                <th>最寄駅</th>
                <td th:text="${hotel.nearestStation}">桜木町駅</td>
            </tr>
            <tr>
                <th>価格</th>
                <td th:text="${#numbers.formatInteger(hotel.price, 1, 'COMMA')}">10,000</td>
            </tr>
        </table>
    </div>
</div>
</body>
</html>
